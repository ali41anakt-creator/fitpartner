<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Партнёры — FitPartner</title>
<link rel="stylesheet" href="../css/style.css">
<style>
.filters{display:flex;gap:10px;flex-wrap:wrap;padding:16px 32px;border-bottom:var(--border);background:var(--dark2);position:sticky;top:64px;z-index:40;}
.filter-sel{padding:9px 14px;background:var(--dark3);border:var(--border);border-radius:8px;color:var(--text);font-size:13px;outline:none;cursor:pointer;font-family:'Manrope',sans-serif;}
.filter-sel:focus{border-color:var(--neon);}
.filter-sel option{background:var(--dark2);}
.users-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:20px;padding:24px 32px;}
.user-card{background:var(--dark3);border:var(--border);border-radius:var(--radius);overflow:hidden;transition:all 0.3s;}
.user-card:hover{transform:translateY(-5px);border-color:rgba(0,255,135,0.2);box-shadow:0 16px 40px rgba(0,0,0,0.4);}
.uc-top{padding:22px 20px 14px;display:flex;align-items:flex-start;gap:14px;}
.uc-info .name{font-weight:700;font-size:16px;margin-bottom:3px;}
.uc-info .meta{color:var(--text2);font-size:12px;}
.uc-body{padding:0 20px 14px;}
.uc-tags{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:10px;}
.uc-bio{
  color:var(--text2);
  font-size:13px;
  line-height:1.55;
  display:-webkit-box;
  -webkit-line-clamp:2;
  -webkit-box-orient:vertical;
  overflow:hidden;
  line-clamp: 2;
}
.uc-footer{padding:12px 16px;border-top:var(--border);display:flex;gap:8px;}
.btn-like{width:40px;height:40px;padding:0;border-radius:10px;background:var(--dark4);border:var(--border);color:var(--text2);font-size:18px;cursor:pointer;transition:all 0.2s;flex-shrink:0;display:flex;align-items:center;justify-content:center;}
.btn-like:hover,.btn-like.liked{background:rgba(255,71,87,0.15);color:var(--red);border-color:rgba(255,71,87,0.3);}
.limit-banner{margin:0 32px 32px;background:linear-gradient(135deg,rgba(124,58,237,0.12),rgba(0,229,255,0.08));border:1px solid rgba(124,58,237,0.3);border-radius:var(--radius);padding:40px;text-align:center;}
.search-exhausted{text-align:center;padding:80px 32px;}
.pview-top{display:flex;align-items:center;gap:20px;margin-bottom:20px;}
.pview-bio{background:var(--dark3);border-radius:12px;padding:16px;font-size:14px;line-height:1.7;color:var(--text2);margin:16px 0;}
@media(max-width:768px){.users-grid{padding:16px;grid-template-columns:1fr;}.filters,.limit-banner{padding:12px 16px;margin:0 0 16px;}}

</style>
</head>
<body>
<nav class="app-nav">
  <div class="logo">FP</div>
  <a href="/pages/dashboard.html" class="nav-item" data-page="dashboard">🏠</a>
  <a href="/pages/partners.html" class="nav-item active" data-page="partners">🏋️</a>
  <a href="/pages/messages.html" class="nav-item" data-page="messages">💬<span class="notif" id="msg-badge">0</span></a>
  <a href="/pages/profile.html" class="nav-item" data-page="profile">👤</a>
  <div class="nav-spacer"></div>
</nav>

<div class="app-content">
  <div class="page-header">
    <div class="page-title">🔍 Найти партнёра</div>
    <div style="color:var(--text2);font-size:13px;" id="count-label"></div>
  </div>

  <div class="filters">
    <select class="filter-sel" id="f-gender" onchange="loadUsers()">
      <option value="">Все (пол)</option><option value="male">Мужчины</option><option value="female">Женщины</option>
    </select>
    <select class="filter-sel" id="f-level" onchange="loadUsers()">
      <option value="">Все уровни</option><option value="beginner">Новичок</option><option value="intermediate">Средний</option><option value="advanced">Продвинутый</option>
    </select>
    <select class="filter-sel" id="f-district" onchange="loadUsers()">
      <option value="">Все районы</option>
      <option>Алмалинский</option><option>Бостандыкский</option><option>Ауэзовский</option>
      <option>Жетысуский</option><option>Медеуский</option><option>Наурызбайский</option><option>Турксибский</option>
    </select>
    <button class="btn btn-ghost btn-sm" onclick="resetFilters()">Сбросить</button>
  </div>

  <div id="container"></div>
  <div class="limit-banner" id="limit-banner" style="display:none;">
    <div style="font-size:48px;margin-bottom:16px;">⭐</div>
    <h2 style="font-family:'Bebas Neue',sans-serif;font-size:28px;letter-spacing:1px;margin-bottom:12px;">ЕЩЁ <span id="hidden-count">0</span> ЧЕЛОВЕК СКРЫТО</h2>
    <p style="color:var(--text2);font-size:15px;line-height:1.7;max-width:420px;margin:0 auto 24px;">Premium открывает все анкеты, лайки и отправку фото в чате.</p>
    <a href="/pages/subscription.html" class="btn btn-primary btn-lg">Открыть всех — от 800₸</a>
  </div>
</div>

<!-- Profile modal -->
<div class="modal-backdrop" id="modal-view">
  <div class="modal">
    <button class="modal-close" onclick="closeModal('modal-view')">✕</button>
    <div id="modal-content"></div>
  </div>
</div>

<!-- Premium modal -->
<div class="modal-backdrop" id="modal-premium">
  <div class="modal" style="text-align:center;">
    <button class="modal-close" onclick="closeModal('modal-premium')">✕</button>
    <div style="font-size:52px;margin-bottom:12px;">⭐</div>
    <div class="modal-title">ТРЕБУЕТСЯ PREMIUM</div>
    <div class="modal-sub">Лайки доступны с Premium подпиской. Написать партнёру — всегда бесплатно!</div>
    <div style="background:rgba(0,255,135,0.06);border:1px solid rgba(0,255,135,0.2);border-radius:12px;padding:20px;margin:20px 0;">
      <div style="font-family:'Bebas Neue',sans-serif;font-size:48px;color:var(--neon);">от 800₸</div>
      <div style="color:var(--text2);font-size:13px;">в месяц через Kaspi</div>
    </div>
    <a href="/pages/subscription.html" class="btn btn-primary btn-full btn-lg">Оформить Premium →</a>
  </div>
</div>

<script src="../js/api.js"></script>
<script src="https://cdn.socket.io/4.7.4/socket.io.min.js"></script>
<script>
  function avatarEl(u, size = 'md') {
  if (u.avatar) {
    return `<img src="${u.avatar}" class="avatar avatar-${size}">`;
  }
  return `<div class="avatar avatar-${size}">${initials(u.name)}</div>`;
}
let onlineUsers=[], socket;
document.addEventListener('DOMContentLoaded', () => {
  if (!Auth.requireAuth()) return;
  loadUsers();
  const user = Auth.getUser();
  if (user) {
    socket = io();
    socket.emit('user_online', user.id);
    socket.on('online_users', ids => {
      onlineUsers = ids.map(String);
      document.querySelectorAll('.od').forEach(d => d.classList.toggle('online', onlineUsers.includes(d.dataset.uid)));
    });
  }
});

async function loadUsers() {
  const el = document.getElementById('container');
  el.innerHTML = '<div class="loading-center"><span class="spinner"></span></div>';
  document.getElementById('limit-banner').style.display = 'none';
  try {
    const params = {};
    const g = document.getElementById('f-gender').value;
    const l = document.getElementById('f-level').value;
    const d = document.getElementById('f-district').value;
    if (g) params.gender = g;
    if (l) params.fitness_level = l;
    if (d) params.district = d;

    const data = await api.getUsers(params);
    const { users, total, limited, hidden, searches_remaining } = data;

    if (data.searches_remaining !== null && data.searches_remaining !== undefined) {
      document.getElementById('count-label').innerHTML =
        `Найдено: ${total} · Осталось поисков сегодня: <strong style="color:${searches_remaining<=2?'var(--red)':'var(--neon)'};">${searches_remaining}</strong>`;
    } else {
      document.getElementById('count-label').textContent = `${total} партнёров найдено`;
    }

    if (!users.length) {
      el.innerHTML = '<div class="empty-state"><div class="icon">🔍</div><h3>Никого не найдено</h3><p>Попробуйте изменить фильтры</p></div>';
      return;
    }

    el.innerHTML = `<div class="users-grid">${users.map(renderCard).join('')}</div>`;

    if (limited) {
      document.getElementById('hidden-count').textContent = hidden;
      document.getElementById('limit-banner').style.display = 'block';
    }
  } catch(e) {
    if (e.message.includes('Лимит') || e.message.includes('limit')) {
      el.innerHTML = `<div class="search-exhausted">
        <div style="font-size:60px;margin-bottom:16px;">⏰</div>
        <h2 style="font-family:'Bebas Neue',sans-serif;font-size:28px;letter-spacing:1px;margin-bottom:12px;">ЛИМИТ ПОИСКОВ ИСЧЕРПАН</h2>
        <p style="color:var(--text2);font-size:14px;line-height:1.7;max-width:400px;margin:0 auto 24px;">Вы использовали 10 бесплатных поисков сегодня. Обновится завтра или оформите Premium.</p>
        <a href="/pages/subscription.html" class="btn btn-primary">Оформить Premium →</a>
      </div>`;
    } else {
      el.innerHTML = `<div class="empty-state"><div class="icon">❌</div><h3>Ошибка</h3><p>${e.message}</p></div>`;
    }
  }
}

function renderCard(u) {
  const isOnline = onlineUsers.includes(String(u.id));
  const isPrem = u.is_subscribed;
  return `
  <div class="user-card">
    <div class="uc-top">
      <div style="position:relative;flex-shrink:0;">
        ${avatarEl(u, 'lg')}
        <span class="online-dot od ${isOnline?'online':''}" data-uid="${u.id}" style="position:absolute;bottom:2px;right:2px;border-color:var(--dark3);"></span>
      </div>
      <div class="uc-info">
        <div class="name">${u.name}${isPrem?' <span style="font-size:12px;">⭐</span>':''}</div>
        <div class="meta">${u.age?u.age+' лет • ':''}📍 ${u.district||'Алматы'}</div>
      </div>
    </div>
    <div class="uc-body">
      <div class="uc-tags">
        <span class="badge badge-green">${LEVELS[u.fitness_level]||'Новичок'}</span>
        ${u.goals?`<span class="badge badge-blue">${u.goals}</span>`:''}
        ${u.schedule?`<span class="badge badge-orange">⏰ ${u.schedule}</span>`:''}
      </div>
      ${u.bio?`<div class="uc-bio">${u.bio}</div>`:''}
    </div>
    <div class="uc-footer">
      <button class="btn-like ${u.liked?'liked':''}" onclick="toggleLike(${u.id},this)">${u.liked?'❤️':'🤍'}</button>
      <button class="btn btn-ghost btn-sm" style="flex:1" onclick="viewUser(${u.id})">Профиль</button>
      <a href="/pages/messages.html?uid=${u.id}&name=${encodeURIComponent(u.name)}" class="btn btn-primary btn-sm" style="flex:1">💬 Написать</a>
    </div>
  </div>`;
}

async function toggleLike(id, btn) {
  try {
    const d = await api.toggleLike(id);
    btn.innerHTML = d.liked ? '❤️' : '🤍';
    btn.classList.toggle('liked', d.liked);
    toast(d.liked ? 'Лайк поставлен! ❤️' : 'Лайк убран', 'info');
  } catch(e) {
    if (e.message.includes('Premium') || e.message.includes('подписка')) document.getElementById('modal-premium').classList.add('open');
    else toast(e.message, 'error');
  }
}

async function viewUser(id) {
  const mc = document.getElementById('modal-content');
  mc.innerHTML = '<div class="loading-center"><span class="spinner"></span></div>';
  document.getElementById('modal-view').classList.add('open');
  try {
    const { user: u } = await api.getUser(id);
    mc.innerHTML = `
      <div class="pview-top">
        ${avatarEl(u, 'xl')}
        <div>
          <div style="font-family:'Bebas Neue',sans-serif;font-size:28px;letter-spacing:1px;">${u.name}${u.is_subscribed?' ⭐':''}</div>
          <div style="color:var(--text2);font-size:13px;">${u.age?u.age+' лет':''}${u.gender?' • '+GENDERS[u.gender]:''}${u.district?' • 📍 '+u.district:''}</div>
          <div style="margin-top:8px;display:flex;gap:6px;flex-wrap:wrap;">
            ${u.fitness_level?`<span class="badge badge-green">${LEVELS[u.fitness_level]}</span>`:''}
            ${u.goals?`<span class="badge badge-blue">${u.goals}</span>`:''}
          </div>
        </div>
      </div>
      ${u.schedule?`<div style="margin-bottom:12px;"><span class="badge badge-orange">⏰ ${u.schedule}</span></div>`:''}
      ${u.bio?`<div class="pview-bio">${u.bio}</div>`:''}
      <div style="display:flex;gap:10px;margin-top:20px;">
        <button class="btn btn-ghost" onclick="closeModal('modal-view')">Закрыть</button>
        <a href="/pages/messages.html?uid=${u.id}&name=${encodeURIComponent(u.name)}" class="btn btn-primary btn-full">💬 Написать ${u.name.split(' ')[0]}</a>
      </div>`;
  } catch(e) {
    mc.innerHTML = `<div class="empty-state"><div class="icon">❌</div><p>${e.message}</p></div>`;
  }
}

function closeModal(id) { document.getElementById(id).classList.remove('open'); }
function resetFilters() { ['f-gender','f-level','f-district'].forEach(id => document.getElementById(id).value=''); loadUsers(); }
document.querySelectorAll('.modal-backdrop').forEach(m => m.addEventListener('click', e => { if(e.target===e.currentTarget) e.target.classList.remove('open'); }));
</script>
</body>
</html>
